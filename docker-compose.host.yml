name: quiet-chaos

services:
  quiet-chaos:
    build:
      context: .
      dockerfile: Dockerfile
    image: quiet-chaos:local
    restart: unless-stopped
    command:
      ["run", "--config", "/app/config.toml", "--cache-dir", "/home/nonroot/.cache/quiet-chaos"]
    ports:
      - "8080:8080"
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /opt/quiet-chaos/config.toml:/app/config.toml:ro
      - quiet-chaos-cache:/home/nonroot/.cache/quiet-chaos

volumes:
  quiet-chaos-cache: